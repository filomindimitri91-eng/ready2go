openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Ready2Go Travel Planning API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User operations
  - name: trips
    description: Trip operations
  - name: events
    description: Event operations
  - name: members
    description: Trip member operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /users:
    post:
      operationId: createUser
      tags: [users]
      summary: Create or get user by username
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "200":
          description: User found or created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trips:
    get:
      operationId: getTrips
      tags: [trips]
      summary: Get all trips for a user
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of trips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TripSummary"
    post:
      operationId: createTrip
      tags: [trips]
      summary: Create a new trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTripRequest"
      responses:
        "201":
          description: Trip created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"

  /trips/{tripId}:
    get:
      operationId: getTrip
      tags: [trips]
      summary: Get trip details
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trip details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripDetail"
        "404":
          description: Trip not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTrip
      tags: [trips]
      summary: Delete a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trip deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Trip not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trips/join:
    post:
      operationId: joinTrip
      tags: [trips]
      summary: Join a trip with invite code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinTripRequest"
      responses:
        "200":
          description: Joined trip successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "404":
          description: Invalid invite code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Already a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trips/{tripId}/members:
    get:
      operationId: getTripMembers
      tags: [members]
      summary: Get members of a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"

  /trips/{tripId}/events:
    get:
      operationId: getTripEvents
      tags: [events]
      summary: Get events for a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create an event in a trip
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventRequest"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /trips/{tripId}/events/{eventId}:
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete an event
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: integer
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Event not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    CreateUserRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 50
      required:
        - username

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - username
        - createdAt

    CreateTripRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        destination:
          type: string
          minLength: 1
        description:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        creatorId:
          type: integer
      required:
        - name
        - destination
        - startDate
        - endDate
        - creatorId

    Trip:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        destination:
          type: string
        description:
          type: string
          nullable: true
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        inviteCode:
          type: string
        creatorId:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - destination
        - startDate
        - endDate
        - inviteCode
        - creatorId
        - createdAt

    TripSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        destination:
          type: string
        description:
          type: string
          nullable: true
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        inviteCode:
          type: string
        creatorId:
          type: integer
        memberCount:
          type: integer
        eventCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - destination
        - startDate
        - endDate
        - inviteCode
        - creatorId
        - memberCount
        - eventCount
        - createdAt

    TripDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        destination:
          type: string
        description:
          type: string
          nullable: true
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        inviteCode:
          type: string
        creatorId:
          type: integer
        members:
          type: array
          items:
            $ref: "#/components/schemas/Member"
        events:
          type: array
          items:
            $ref: "#/components/schemas/Event"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - destination
        - startDate
        - endDate
        - inviteCode
        - creatorId
        - members
        - events
        - createdAt

    JoinTripRequest:
      type: object
      properties:
        inviteCode:
          type: string
        userId:
          type: integer
      required:
        - inviteCode
        - userId

    Member:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        tripId:
          type: integer
        username:
          type: string
        joinedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - tripId
        - username
        - joinedAt

    EventType:
      type: string
      enum:
        - activite
        - transport
        - logement
        - reunion
        - autre

    CreateEventRequest:
      type: object
      properties:
        type:
          $ref: "#/components/schemas/EventType"
        title:
          type: string
          minLength: 1
        location:
          type: string
          nullable: true
        date:
          type: string
          format: date
        startTime:
          type: string
          nullable: true
        endTime:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        creatorId:
          type: integer
      required:
        - type
        - title
        - date
        - creatorId

    Event:
      type: object
      properties:
        id:
          type: integer
        tripId:
          type: integer
        type:
          $ref: "#/components/schemas/EventType"
        title:
          type: string
        location:
          type: string
          nullable: true
        date:
          type: string
          format: date
        startTime:
          type: string
          nullable: true
        endTime:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        creatorId:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - tripId
        - type
        - title
        - date
        - creatorId
        - createdAt
