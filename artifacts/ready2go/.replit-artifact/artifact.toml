kind = "web"
previewPath = "/"
title = "Ready2Go"
version = "1.0.0"
id = "artifacts/ready2go"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21626

[services.development]
run = "pnpm --filter @workspace/ready2go run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ready2go", "run", "build" ]
publicDir = "artifacts/ready2go/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21626"
BASE_PATH = "/"
